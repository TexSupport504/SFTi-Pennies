<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="preferencesGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1">
        <animate attributeName="stop-color" values="#00ff88;#00d4ff;#00ff88" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1">
        <animate attributeName="stop-color" values="#00d4ff;#00ff88;#00d4ff" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  
  <!-- Settings gear -->
  <g transform="translate(16, 16)">
    <animateTransform attributeName="transform" 
                      type="rotate" 
                      from="0 16 16" 
                      to="360 16 16" 
                      dur="8s" 
                      repeatCount="indefinite"/>
    
    <path fill="none" stroke="url(#preferencesGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          d="M-1.5,-10 L1.5,-10 L2,-8 L4,-7 L6,-7.5 L7.5,-6 L7,-4 L8,-2 L10,-1.5 L10,1.5 L8,2 L7,4 L7.5,6 L6,7.5 L4,7 L2,8 L1.5,10 L-1.5,10 L-2,8 L-4,7 L-6,7.5 L-7.5,6 L-7,4 L-8,2 L-10,1.5 L-10,-1.5 L-8,-2 L-7,-4 L-7.5,-6 L-6,-7.5 L-4,-7 L-2,-8 Z">
      <animate attributeName="stroke-dasharray" 
               from="0,200" 
               to="200,0" 
               dur="3s" 
               repeatCount="indefinite"/>
    </path>
    
    <!-- Center circle -->
    <circle cx="0" cy="0" r="4" fill="none" stroke="url(#preferencesGradient)" stroke-width="2"/>
  </g>
</svg>
