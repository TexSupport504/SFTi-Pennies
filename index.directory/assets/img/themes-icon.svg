<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="themesGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1">
        <animate attributeName="stop-color" values="#00ff88;#ffd93d;#00d4ff;#00ff88" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#ffd93d;stop-opacity:1">
        <animate attributeName="stop-color" values="#ffd93d;#00d4ff;#00ff88;#ffd93d" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1">
        <animate attributeName="stop-color" values="#00d4ff;#00ff88;#ffd93d;#00d4ff" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  
  <!-- Sun/Moon combined icon -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="url(#themesGradient)" stroke-width="2">
    <animate attributeName="r" values="8;9;8" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Sun rays -->
  <g stroke="url(#themesGradient)" stroke-width="2" stroke-linecap="round">
    <line x1="16" y1="4" x2="16" y2="7">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="0s"/>
    </line>
    <line x1="23.3" y1="8.7" x2="21.2" y2="10.8">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="0.25s"/>
    </line>
    <line x1="28" y1="16" x2="25" y2="16">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </line>
    <line x1="23.3" y1="23.3" x2="21.2" y2="21.2">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="0.75s"/>
    </line>
    <line x1="16" y1="28" x2="16" y2="25">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="1s"/>
    </line>
    <line x1="8.7" y1="23.3" x2="10.8" y2="21.2">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="1.25s"/>
    </line>
    <line x1="4" y1="16" x2="7" y2="16">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    </line>
    <line x1="8.7" y1="8.7" x2="10.8" y2="10.8">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite" begin="1.75s"/>
    </line>
  </g>
</svg>
