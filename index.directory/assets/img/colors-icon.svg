<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="colorsGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1">
        <animate attributeName="stop-color" values="#00ff88;#ffd93d;#00ff88" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#ffd93d;stop-opacity:1">
        <animate attributeName="stop-color" values="#ffd93d;#00ff88;#ffd93d" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  
  <!-- Palette shape -->
  <path fill="none" stroke="url(#colorsGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        d="M16 4C9.4 4 4 9.4 4 16c0 6.6 5.4 12 12 12 1.1 0 2-.9 2-2 0-.5-.2-1-.5-1.3-.3-.4-.5-.8-.5-1.4 0-1.1.9-2 2-2h2.4c3.5 0 6.6-2.8 6.6-6.3 0-6-5.4-10.9-12-10.9z">
    <animate attributeName="stroke-dasharray" 
             from="0,200" 
             to="200,0" 
             dur="3s" 
             repeatCount="indefinite"/>
  </path>
  
  <!-- Color dots -->
  <circle cx="10" cy="12" r="2" fill="#00ff88">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="16" cy="9" r="2" fill="#ffd93d">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="22" cy="12" r="2" fill="#00d4ff">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="20" cy="18" r="2" fill="#ff4757">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
</svg>
