<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPIs</title>
<style>
:root{--bg:#fff;--text:#1a1a1a;--mute:#999;--border:#ebebeb;--green:#2d8a56;--red:#c0392b;--blue:#4a6fa5;--gold:#b8860b}
.theme-dark{--bg:#0c0c0c;--text:#e8e8e8;--mute:#666;--border:#222;--green:#4a9e6e;--red:#c75050;--blue:#6b8fc2;--gold:#c99a2e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,"Apple Color Emoji",Arial,sans-serif;background:var(--bg);color:var(--text);padding:0;line-height:1}
.row{display:flex;border-bottom:1px solid var(--border)}
.kpi{flex:1;padding:14px 20px;border-right:1px solid var(--border)}
.kpi:last-child{border-right:none}
.label{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--mute);font-weight:500}
.value{font-size:22px;font-weight:600;margin-top:5px;font-family:SFMono-Regular,iawritermonoS,"Roboto Mono",Menlo,Consolas,monospace;letter-spacing:-0.5px}
.sub{font-size:10px;color:var(--mute);margin-top:4px}
.pos{color:var(--green)}.neg{color:var(--red)}
.spark{display:flex;gap:1px;align-items:flex-end;height:18px;margin-top:6px}
.spark .b{width:4px;min-height:1px}
.spark .u{background:var(--green)}.spark .d{background:var(--red)}
</style>
</head>
<body>
<div id="g"></div>
<script>
const P=new URLSearchParams(location.search);
const t=P.get('theme')||'light';if(t==='dark')document.body.classList.add('theme-dark');
async function L(){
const r=await fetch('../trades-index.json');const d=await r.json();
const s=d.statistics||{};const tr=d.trades||[];const dp=d.daily_pnl||{};
const rc=tr.slice(-20);
const sk=rc.map(t=>{const h=Math.min(Math.max(Math.abs(t.pnl_usd)/500*18,2),18);return'<div class="b '+(t.pnl_usd>=0?'u':'d')+'" style="height:'+h+'px"></div>'}).join('');
const now=new Date();const mk=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
let mp=0,mt=0;for(const[dt,v]of Object.entries(dp)){if(dt.startsWith(mk)){mp+=v.net;mt+=v.trades.length}}
const ws=new Date(now);ws.setDate(now.getDate()-now.getDay());let wp=0;
for(const[dt,v]of Object.entries(dp)){if(new Date(dt+'T12:00:00')>=ws)wp+=v.net}
const f=n=>(n>=0?'+$':'-$')+Math.abs(n).toLocaleString('en-US',{maximumFractionDigits:0});
// Row 1: 4 cols - Total, Win Rate, PF, This Month
// Row 2: 4 cols - This Week, Drawdown, Best, Worst
const r1=[
{l:'TOTAL P&L',v:f(s.total_pnl),c:s.total_pnl>=0?'pos':'neg',s:s.total_trades+' trades',sk},
{l:'WIN RATE',v:s.win_rate+'%',c:s.win_rate>=50?'pos':'neg',s:s.winning_trades+'W / '+s.losing_trades+'L'},
{l:'PROFIT FACTOR',v:s.profit_factor.toFixed(2),c:s.profit_factor>=1?'pos':'neg',s:'Avg win '+f(s.average_win)},
{l:'THIS MONTH',v:f(mp),c:mp>=0?'pos':'neg',s:mt+' trades'},
];
const r2=[
{l:'THIS WEEK',v:f(wp),c:wp>=0?'pos':'neg',s:'Current week'},
{l:'MAX DRAWDOWN',v:'-$'+Math.abs(s.max_drawdown).toLocaleString('en-US',{maximumFractionDigits:0}),c:'neg',s:'From peak'},
{l:'BEST TRADE',v:f(s.best_trade),c:'pos',s:'Single max'},
{l:'WORST TRADE',v:f(s.worst_trade),c:'neg',s:'Single min'},
];
const mk2=cs=>cs.map(c=>'<div class="kpi"><div class="label">'+c.l+'</div><div class="value '+c.c+'">'+c.v+'</div><div class="sub">'+c.s+'</div>'+(c.sk?'<div class="spark">'+c.sk+'</div>':'')+'</div>').join('');
document.getElementById('g').innerHTML='<div class="row">'+mk2(r1)+'</div><div class="row">'+mk2(r2)+'</div>';
}L();
</script>
</body>
</html>
