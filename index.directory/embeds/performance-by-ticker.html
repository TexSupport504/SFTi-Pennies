<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>By Ticker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
<style>
:root{--bg:#fff;--text:#1a1a1a;--mute:#999;--border:#ebebeb;--green:#2d8a56;--red:#c0392b;--grid:#f5f5f5}
.theme-dark{--bg:#0c0c0c;--text:#e8e8e8;--mute:#666;--border:#222;--green:#4a9e6e;--red:#c75050;--grid:#1a1a1a}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%}
body{font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,"Apple Color Emoji",Arial,sans-serif;background:var(--bg);color:var(--text);padding:12px 16px;height:100vh;display:flex;flex-direction:column}
.head{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--mute);font-weight:500;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.wrap{flex:1;position:relative}
</style>
</head>
<body>
<div class="head">P&L by Ticker</div>
<div class="wrap"><canvas id="c"></canvas></div>
<script>
const t=(new URLSearchParams(location.search)).get('theme')||'light';
if(t==='dark')document.body.classList.add('theme-dark');
const dk=t==='dark';const g=getComputedStyle(document.body);
async function L(){
const r=await fetch('../trades-index.json');const d=await r.json();const bt=d.by_ticker||{};
const s=Object.entries(bt).sort((a,b)=>b[1].total-a[1].total);
const gc=g.getPropertyValue('--green').trim(),rc=g.getPropertyValue('--red').trim();
new Chart(document.getElementById('c'),{type:'bar',data:{labels:s.map(e=>e[0]),datasets:[{data:s.map(e=>e[1].total),backgroundColor:s.map(e=>e[1].total>=0?gc:rc),barThickness:18}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'$'+ctx.parsed.x.toLocaleString('en-US',{minimumFractionDigits:2})+' ('+bt[ctx.label].count+' trades)'}}},scales:{x:{ticks:{color:dk?'#555':'#bbb',callback:v=>'$'+v.toLocaleString(),font:{size:9,family:'SFMono-Regular,iawritermonoS,"Roboto Mono",Menlo,Consolas,monospace'}},grid:{color:dk?'#1a1a1a':'#f5f5f5',lineWidth:0.5},border:{display:false}},y:{ticks:{color:dk?'#ccc':'#555',font:{weight:'600',size:11,family:'ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,"Apple Color Emoji",Arial,sans-serif'}},grid:{display:false},border:{display:false}}}}});
}L();
</script>
</body>
</html>
