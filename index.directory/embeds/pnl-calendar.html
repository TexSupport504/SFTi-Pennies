<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P&L Calendar</title>
<style>
:root{--bg:#fff;--text:#1a1a1a;--mute:#999;--border:#ebebeb;--green:#2d8a56;--red:#c0392b;--accent:#b8860b;--gbg:rgba(45,138,86,0.08);--rbg:rgba(192,57,43,0.08);--gbg2:rgba(45,138,86,0.18);--rbg2:rgba(192,57,43,0.18)}
.theme-dark{--bg:#0c0c0c;--text:#e8e8e8;--mute:#666;--border:#222;--green:#4a9e6e;--red:#c75050;--accent:#c99a2e;--gbg:rgba(74,158,110,0.1);--rbg:rgba(199,80,80,0.1);--gbg2:rgba(74,158,110,0.22);--rbg2:rgba(199,80,80,0.22)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,"Apple Color Emoji",Arial,sans-serif;background:var(--bg);color:var(--text);padding:8px 12px}
.hd{display:flex;justify-content:space-between;align-items:center;padding:4px 0 8px;border-bottom:1px solid var(--border);margin-bottom:6px}
.hd h2{font-size:13px;font-weight:600;letter-spacing:-0.3px}
.hd button{background:none;border:1px solid var(--border);color:var(--mute);padding:2px 10px;cursor:pointer;font-size:12px;font-family:inherit}
.hd button:hover{color:var(--text)}
.dow{display:grid;grid-template-columns:repeat(7,1fr);gap:0;margin-bottom:1px}
.dow div{text-align:center;font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--mute);padding:4px 0;font-weight:500}
.gr{display:grid;grid-template-columns:repeat(7,1fr);gap:0}
.dy{aspect-ratio:1;padding:6px 8px;border:0.5px solid var(--border);position:relative;display:flex;flex-direction:column}
.dy.mt{opacity:0.2}
.dy .dt{font-size:9px;color:var(--mute)}
.dy .pl{font-size:13px;font-weight:600;margin-top:4px;font-family:SFMono-Regular,iawritermonoS,"Roboto Mono",Menlo,Consolas,monospace;letter-spacing:-0.3px}
.dy.w{background:var(--gbg)}.dy.w .pl{color:var(--green)}
.dy.l{background:var(--rbg)}.dy.l .pl{color:var(--red)}
.dy.bw{background:var(--gbg2)}.dy.bl{background:var(--rbg2)}
.dy.td{box-shadow:inset 0 0 0 1.5px var(--accent)}
.dy .cards{margin-top:auto}
.tc{font-size:9px;padding:2px 0;display:flex;justify-content:space-between;border-top:0.5px solid var(--border);margin-top:1px}
.tc .tk{font-weight:600;color:var(--mute)}.tc .tp{font-family:SFMono-Regular,iawritermonoS,"Roboto Mono",Menlo,Consolas,monospace}
.tc .tp.p{color:var(--green)}.tc .tp.n{color:var(--red)}
.ft{display:flex;justify-content:space-between;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-size:10px;color:var(--mute)}
.ft .tv{font-family:SFMono-Regular,iawritermonoS,"Roboto Mono",Menlo,Consolas,monospace;font-weight:600;font-size:14px}
.ft .tv.p{color:var(--green)}.ft .tv.n{color:var(--red)}
.st{display:flex;gap:16px;font-size:9px;color:var(--mute);padding:6px 0 2px;border-bottom:1px solid var(--border);margin-bottom:4px}
.st b{color:var(--text);font-family:SFMono-Regular,iawritermonoS,"Roboto Mono",Menlo,Consolas,monospace;font-weight:600}
</style>
</head>
<body>
<div class="hd">
  <button onclick="cm(-1)">&larr;</button>
  <h2 id="ml"></h2>
  <button onclick="cm(1)">&rarr;</button>
</div>
<div class="st" id="st"></div>
<div class="dow"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>
<div class="gr" id="gr"></div>
<div class="ft" id="ft"></div>
<script>
const t=(new URLSearchParams(location.search)).get('theme')||'light';
if(t==='dark')document.body.classList.add('theme-dark');
let cd=new Date(),dp={};
async function ld(){
const r=await fetch('../trades-index.json');const d=await r.json();dp=d.daily_pnl||{};
const ds=Object.keys(dp).sort();
if(ds.length){const l=new Date(ds[ds.length-1]+'T12:00:00');cd=new Date(l.getFullYear(),l.getMonth(),1)}
rn();
}
function cm(d){cd.setMonth(cd.getMonth()+d);rn()}
function f(n){const a=Math.abs(n);const s=a>=1000?a.toLocaleString('en-US',{maximumFractionDigits:0}):a.toFixed(0);return n>=0?'+$'+s:'-$'+s}
function rn(){
const y=cd.getFullYear(),m=cd.getMonth();
const nm=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
document.getElementById('ml').textContent=nm[m]+' '+y;
const fd=new Date(y,m,1).getDay(),dm=new Date(y,m+1,0).getDate(),td=new Date();
let mp=0,mw=0,ml=0,mt=0,h='';
for(let i=0;i<fd;i++)h+='<div class="dy mt"></div>';
for(let d=1;d<=dm;d++){
const ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
const dd=dp[ds];const it=td.getFullYear()===y&&td.getMonth()===m&&td.getDate()===d;
let c='dy';if(it)c+=' td';
if(dd){
const n=dd.net;mp+=n;mt+=dd.trades.length;
if(n>0){mw++;c+=Math.abs(n)>1000?' bw':' w'}else if(n<0){ml++;c+=Math.abs(n)>1000?' bl':' l'}
let tc='';for(const t of dd.trades){const pc=t.pnl>=0?'p':'n';tc+='<div class="tc"><span class="tk">'+t.ticker+'</span><span class="tp '+pc+'">'+f(t.pnl)+'</span></div>'}
h+='<div class="'+c+'"><div class="dt">'+d+'</div><div class="pl">'+f(n)+'</div><div class="cards">'+tc+'</div></div>';
}else{h+='<div class="'+c+'"><div class="dt">'+d+'</div></div>'}
}
document.getElementById('gr').innerHTML=h;
const tc=mp>=0?'p':'n';
document.getElementById('ft').innerHTML='<div>Monthly P&L<br><span class="tv '+tc+'">'+f(mp)+'</span></div><div style="text-align:right">'+mt+' trades<br><span class="tv">'+mw+'W / '+ml+'L</span></div>';
document.getElementById('st').innerHTML='Trades <b>'+mt+'</b> Win Days <b>'+mw+'</b> Loss Days <b>'+ml+'</b> Rate <b>'+(mw+ml>0?Math.round(mw/(mw+ml)*100):0)+'%</b>';
}
ld();
</script>
</body>
</html>
