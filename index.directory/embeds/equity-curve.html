<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equity Curve</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
<style>
:root{--bg:#fff;--text:#1a1a1a;--mute:#999;--border:#ebebeb;--green:#2d8a56;--red:#c0392b;--grid:#f5f5f5}
.theme-dark{--bg:#0c0c0c;--text:#e8e8e8;--mute:#666;--border:#222;--green:#4a9e6e;--red:#c75050;--grid:#1a1a1a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,"Apple Color Emoji",Arial,sans-serif;background:var(--bg);color:var(--text);padding:12px 16px;height:100vh;display:flex;flex-direction:column}
.head{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:8px}
.head h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--mute);font-weight:500}
.head .val{font-family:SFMono-Regular,iawritermonoS,"Roboto Mono",Menlo,Consolas,monospace;font-size:14px;font-weight:600}
.pos{color:var(--green)}.neg{color:var(--red)}
.wrap{flex:1;position:relative}
.foot{display:flex;gap:24px;padding-top:8px;border-top:1px solid var(--border);margin-top:8px;font-size:10px;color:var(--mute)}
.foot span{font-family:SFMono-Regular,iawritermonoS,"Roboto Mono",Menlo,Consolas,monospace;color:var(--text);font-weight:600}
</style>
</head>
<body>
<div class="head"><h3>Equity Curve</h3><div class="val" id="total"></div></div>
<div class="wrap"><canvas id="c"></canvas></div>
<div class="foot" id="foot"></div>
<script>
const t=(new URLSearchParams(location.search)).get('theme')||'light';
if(t==='dark')document.body.classList.add('theme-dark');
const dk=t==='dark';
async function L(){
const r=await fetch('../trades-index.json');const d=await r.json();
const eq=d.equity_curve||[];const s=d.statistics||{};
const labels=eq.map(e=>e.date);const vals=eq.map(e=>e.balance);
const last=vals[vals.length-1]||0;
const cl=last>=0?getComputedStyle(document.body).getPropertyValue('--green').trim():getComputedStyle(document.body).getPropertyValue('--red').trim();
document.getElementById('total').className=last>=0?'val pos':'val neg';
document.getElementById('total').textContent=(last>=0?'+$':'-$')+Math.abs(last).toLocaleString('en-US',{minimumFractionDigits:2});
new Chart(document.getElementById('c'),{type:'line',data:{labels,datasets:[{data:vals,borderColor:cl,fill:false,tension:0.1,pointRadius:0,pointHoverRadius:3,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'$'+ctx.parsed.y.toLocaleString('en-US',{minimumFractionDigits:2})}}},scales:{x:{ticks:{color:dk?'#555':'#aaa',maxTicksLimit:6,font:{size:9,family:'SFMono-Regular,iawritermonoS,"Roboto Mono",Menlo,Consolas,monospace'}},grid:{display:false},border:{display:false}},y:{ticks:{color:dk?'#555':'#aaa',callback:v=>'$'+v.toLocaleString(),font:{size:9,family:'SFMono-Regular,iawritermonoS,"Roboto Mono",Menlo,Consolas,monospace'}},grid:{color:dk?'#1a1a1a':'#f5f5f5',lineWidth:0.5},border:{display:false}}}}});
document.getElementById('foot').innerHTML='Win Rate <span>'+s.win_rate+'%</span> Trades <span>'+s.total_trades+'</span> PF <span>'+s.profit_factor+'</span> Drawdown <span>-$'+s.max_drawdown.toLocaleString()+'</span>';
}L();
</script>
</body>
</html>
