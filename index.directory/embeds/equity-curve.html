<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equity Curve</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
<style>
:root{--bg:#fff;--text:#1a1a1a;--mute:#999;--border:#ebebeb;--green:#2d8a56;--red:#c0392b}
.theme-dark{--bg:#0c0c0c;--text:#e8e8e8;--mute:#666;--border:#222;--green:#4a9e6e;--red:#c75050}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%}
body{font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,"Apple Color Emoji",Arial,sans-serif;background:var(--bg);color:var(--text);padding:16px 20px;height:100vh;display:flex;flex-direction:column}
.head{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:12px}
.head h3{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--mute);font-weight:500}
.head .val{font-family:SFMono-Regular,iawritermonoS,"Roboto Mono",Menlo,Consolas,monospace;font-size:16px;font-weight:600}
.pos{color:var(--green)}.neg{color:var(--red)}
.wrap{flex:1;position:relative;min-height:0}
.foot{display:flex;gap:32px;padding-top:10px;border-top:1px solid var(--border);margin-top:12px;font-size:10px;color:var(--mute)}
.foot b{font-family:SFMono-Regular,iawritermonoS,"Roboto Mono",Menlo,Consolas,monospace;color:var(--text);font-weight:600;font-size:12px}
</style>
</head>
<body>
<div class="head"><h3>Equity Curve</h3><div class="val" id="total"></div></div>
<div class="wrap"><canvas id="c"></canvas></div>
<div class="foot" id="foot"></div>
<script>
const t=(new URLSearchParams(location.search)).get('theme')||'light';
if(t==='dark')document.body.classList.add('theme-dark');
const dk=t==='dark';
async function L(){
const r=await fetch('../trades-index.json');const d=await r.json();
const eq=d.equity_curve||[];const s=d.statistics||{};
const labels=eq.map(e=>e.date);const vals=eq.map(e=>e.balance);
const last=vals[vals.length-1]||0;
const cs=getComputedStyle(document.body);
const gc=cs.getPropertyValue('--green').trim();
const rc=cs.getPropertyValue('--red').trim();
const cl=last>=0?gc:rc;
document.getElementById('total').className=last>=0?'val pos':'val neg';
document.getElementById('total').textContent=(last>=0?'+$':'-$')+Math.abs(last).toLocaleString('en-US',{minimumFractionDigits:2});

const ctx=document.getElementById('c').getContext('2d');
const grad=ctx.createLinearGradient(0,0,0,ctx.canvas.parentElement.clientHeight||300);
if(last>=0){grad.addColorStop(0,'rgba(45,138,86,0.15)');grad.addColorStop(1,'rgba(45,138,86,0.0)')}
else{grad.addColorStop(0,'rgba(192,57,43,0.15)');grad.addColorStop(1,'rgba(192,57,43,0.0)')}

new Chart(document.getElementById('c'),{type:'line',data:{labels,datasets:[{data:vals,borderColor:cl,backgroundColor:grad,fill:true,tension:0.2,pointRadius:0,pointHoverRadius:4,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'$'+ctx.parsed.y.toLocaleString('en-US',{minimumFractionDigits:2})},titleFont:{family:'SFMono-Regular,monospace',size:10},bodyFont:{family:'SFMono-Regular,monospace',size:12}}},scales:{x:{ticks:{color:dk?'#555':'#bbb',maxTicksLimit:8,font:{size:9,family:'SFMono-Regular,monospace'}},grid:{display:false},border:{display:false}},y:{ticks:{color:dk?'#555':'#bbb',callback:v=>v>=0?'$'+v.toLocaleString():'-$'+Math.abs(v).toLocaleString(),font:{size:9,family:'SFMono-Regular,monospace'}},grid:{color:dk?'#1a1a1a':'#f5f5f5',lineWidth:0.5},border:{display:false}}}}});
document.getElementById('foot').innerHTML=
  'Win Rate <b>'+s.win_rate+'%</b>'+
  'Trades <b>'+s.total_trades+'</b>'+
  'Profit Factor <b>'+s.profit_factor+'</b>'+
  'Max DD <b>-$'+s.max_drawdown.toLocaleString()+'</b>';
}L();
</script>
</body>
</html>
