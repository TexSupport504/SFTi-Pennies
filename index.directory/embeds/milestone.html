<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milestones</title>
<style>
:root{--bg:#fff;--text:#1a1a1a;--mute:#999;--border:#ebebeb;--green:#2d8a56;--red:#c0392b;--blue:#4a6fa5;--gold:#b8860b}
.theme-dark{--bg:#0c0c0c;--text:#e8e8e8;--mute:#666;--border:#222;--green:#4a9e6e;--red:#c75050;--blue:#6b8fc2;--gold:#c99a2e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);padding:12px 16px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:0}
.card{padding:14px 16px;border:0.5px solid var(--border);position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.card.g::before{background:var(--green)}.card.r::before{background:var(--red)}.card.b::before{background:var(--blue)}.card.o::before{background:var(--gold)}
.card .lb{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--mute);font-weight:500}
.card .vl{font-size:18px;font-weight:600;margin-top:4px;font-family:Menlo,Consolas,monospace;letter-spacing:-0.3px}
.card .vl.pos{color:var(--green)}.card .vl.neg{color:var(--red)}
.card .sb{font-size:9px;color:var(--mute);margin-top:3px}
</style>
</head>
<body>
<div class="grid" id="grid"></div>
<script>
const t=(new URLSearchParams(location.search)).get('theme')||'light';
if(t==='dark')document.body.classList.add('theme-dark');
async function L(){
const r=await fetch('../trades-index.json');const d=await r.json();
const tr=d.trades||[];const s=d.statistics||{};const dp=d.daily_pnl||{};
if(!tr.length){document.getElementById('grid').innerHTML='<p style="color:var(--mute)">No trades yet</p>';return}
const ft=tr[0],bt=tr.reduce((a,b)=>a.pnl_usd>b.pnl_usd?a:b),wt=tr.reduce((a,b)=>a.pnl_usd<b.pnl_usd?a:b);
const days=Object.entries(dp).sort((a,b)=>b[1].net-a[1].net);const bd=days[0],wd=days[days.length-1];
let ws=0,mw=0,ls=0,ml=0;for(const t of tr){if(t.pnl_usd>0){ws++;ls=0;mw=Math.max(mw,ws)}else if(t.pnl_usd<0){ls++;ws=0;ml=Math.max(ml,ls)}}
const f=n=>(n>=0?'+$':'-$')+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2});
const cs=[
{lb:'FIRST TRADE',vl:ft.ticker,vc:'',sb:ft.entry_date+' | '+f(ft.pnl_usd),c:ft.pnl_usd>=0?'g':'r'},
{lb:'TOTAL TRADES',vl:s.total_trades+'',vc:'',sb:s.winning_trades+'W / '+s.losing_trades+'L',c:'b'},
{lb:'BEST TRADE',vl:f(bt.pnl_usd),vc:'pos',sb:bt.ticker+' '+bt.exit_date,c:'g'},
{lb:'WORST TRADE',vl:f(wt.pnl_usd),vc:'neg',sb:wt.ticker+' '+wt.exit_date,c:'r'},
{lb:'BEST DAY',vl:bd?f(bd[1].net):'--',vc:'pos',sb:bd?bd[0]:'',c:'g'},
{lb:'WORST DAY',vl:wd?f(wd[1].net):'--',vc:'neg',sb:wd?wd[0]:'',c:'r'},
{lb:'WIN STREAK',vl:mw+'',vc:'',sb:'Consecutive wins',c:'o'},
{lb:'TOTAL P&L',vl:f(s.total_pnl),vc:s.total_pnl>=0?'pos':'neg',sb:'WR '+s.win_rate+'% | PF '+s.profit_factor,c:s.total_pnl>=0?'g':'r'},
];
document.getElementById('grid').innerHTML=cs.map(c=>'<div class="card '+c.c+'"><div class="lb">'+c.lb+'</div><div class="vl '+c.vc+'">'+c.vl+'</div><div class="sb">'+c.sb+'</div></div>').join('');
}L();
</script>
</body>
</html>
