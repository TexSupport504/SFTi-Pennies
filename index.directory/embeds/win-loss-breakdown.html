<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Win/Loss</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
<style>
:root{--bg:#fff;--text:#1a1a1a;--mute:#999;--border:#ebebeb;--green:#2d8a56;--red:#c0392b}
.theme-dark{--bg:#0c0c0c;--text:#e8e8e8;--mute:#666;--border:#222;--green:#4a9e6e;--red:#c75050}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%}
body{font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,"Apple Color Emoji",Arial,sans-serif;background:var(--bg);color:var(--text);padding:12px 16px;height:100vh;display:flex;gap:20px;align-items:stretch}
.ch{width:40%;display:flex;align-items:center;justify-content:center}
.ch canvas{max-height:200px}
.rows{width:60%;display:flex;flex-direction:column;justify-content:center;gap:0}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.row .lb{font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:0.8px}
.row .vl{font-size:15px;font-weight:600;font-family:SFMono-Regular,iawritermonoS,"Roboto Mono",Menlo,Consolas,monospace;letter-spacing:-0.3px;margin-top:1px}
.pos{color:var(--green)}.neg{color:var(--red)}
</style>
</head>
<body>
<div class="ch"><canvas id="c"></canvas></div>
<div class="rows" id="rows"></div>
<script>
const t=(new URLSearchParams(location.search)).get('theme')||'light';
if(t==='dark')document.body.classList.add('theme-dark');
const g=getComputedStyle(document.body);
async function L(){
const r=await fetch('../trades-index.json');const d=await r.json();const s=d.statistics||{};
const gc=g.getPropertyValue('--green').trim(),rc=g.getPropertyValue('--red').trim();
new Chart(document.getElementById('c'),{type:'doughnut',data:{labels:['Wins','Losses'],datasets:[{data:[s.winning_trades,s.losing_trades],backgroundColor:[gc,rc],borderWidth:0,cutout:'72%'}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}}}});
const f=n=>(n>=0?'+$':'-$')+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2});
const rows=[
['Win Rate',s.win_rate+'%',s.win_rate>=50?'pos':'neg','Profit Factor',s.profit_factor.toFixed(2),s.profit_factor>=1?'pos':'neg'],
['Avg Win',f(s.average_win),'pos','Avg Loss',f(s.average_loss),'neg'],
['Best Trade',f(s.best_trade),'pos','Worst Trade',f(s.worst_trade),'neg'],
['Win Streak',s.max_win_streak+'','','Loss Streak',s.max_loss_streak+'',''],
['Max Drawdown','-$'+s.max_drawdown.toLocaleString('en-US',{minimumFractionDigits:2}),'neg','Total P&L',f(s.total_pnl),s.total_pnl>=0?'pos':'neg'],
];
document.getElementById('rows').innerHTML=rows.map(r=>'<div class="row"><div><div class="lb">'+r[0]+'</div><div class="vl '+r[2]+'">'+r[1]+'</div></div><div style="text-align:right"><div class="lb">'+r[3]+'</div><div class="vl '+r[5]+'">'+r[4]+'</div></div></div>').join('');
}L();
</script>
</body>
</html>
